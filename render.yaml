services:
  - type: web
    name: nova-studio
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push --accept-data-loss && node prisma/seed.js && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/tmp/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
